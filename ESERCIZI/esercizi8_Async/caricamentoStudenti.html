        LEZIONE IN PAUSA FINO ALLE 16:48

        <!-- Compila il form e crea classe Studente con le seguenti proprietà(nome, cognome, avatar[un url scelto a caso online]). Al click sul pulsante Mostra Studenti stampa una card (utilizzando Bootstrap) per ogni singolo studente. All'interno di ogni card ci sarà un pulsante "Seleziona", al click sul seguente pulsante verrà aggiunto ad un corso singolo. Crea una pagina corso linkata alla pagina principale nella quale visualizzerai gli studenti che hai selezionato. Quest'ultima procedura svolgila utilizzando la localStorage -->

        <h1>Carica gli studenti</h1>

        <form>
            <div class="form-group col-4">
            <label for="nome">Nome:</label>
            <input class="form-control" type="text" id="nome" name="nome"><br>

            <label for="nome">Cognome:</label>
            <input class="form-control" type="text" id="cognome" name="cognome"><br>

            <label for="nome">Avatar:</label>
            <input class="form-control" type="text" id="avatar" name="avatar"><br>

            <button class="btn btn-success" type="submit">Aggiungi</button>
            </div>
        </form>

        <hr>

        <button class="btn btn-primary" id="btnPrint">Mostra studenti</button>

        <div id="feed"></div>

    </div>
